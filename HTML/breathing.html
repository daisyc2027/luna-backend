<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
            color: white;
            overflow: hidden;
        }

        .phase-text {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 60px;
            opacity: 0.9;
        }

        .circle-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ripple {
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: rgba(167, 139, 250, 0.15);
            animation: ripple 4s ease-out infinite;
        }

        .ripple:nth-child(2) {
            animation-delay: 1s;
        }

        .ripple:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes ripple {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }

            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        .main-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, #a78bfa, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(167, 139, 250, 0.4);
            transition: transform 0s;
            z-index: 1;
        }

        .count-text {
            font-size: 48px;
            font-weight: 200;
            color: white;
        }

        .instruction-text {
            margin-top: 50px;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .cycle-count {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .done-btn {
            margin-top: 50px;
            padding: 14px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            display: none;
        }

        .exit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 50px;
        }

        .done-btn {
            padding: 14px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .again-btn {
            padding: 14px 40px;
            background: rgba(167, 139, 250, 0.3);
            border: 1px solid rgba(167, 139, 250, 0.6);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <button class="exit-btn" onclick="confirmExit()">✕</button>
    <div class="phase-text">Breathe</div>

    <div class="circle-container">
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="main-circle" id="circle">
            <span class="count-text" id="count">4</span>
        </div>
    </div>

    <div class="instruction-text" id="instruction">Inhale</div>
    <div class="cycle-count" id="cycleCount">Cycle 1 of 4</div>
    <div class="btn-container" id="btnContainer">
        <button class="again-btn" onclick="restart()">Do it again ↺</button>
        <button class="done-btn" onclick="done()">Done ✓</button>
    </div>
    <script>
        const phases = [
            { name: "Inhale", duration: 4, scale: 1.3 },
            { name: "Hold", duration: 4, scale: 1.3 },
            { name: "Exhale", duration: 6, scale: 0.85 },
            { name: "Rest", duration: 2, scale: 0.85 }
        ];

        let currentPhase = 0;
        let currentCount = phases[0].duration;
        let currentCycle = 1;
        const totalCycles = 4;

        const circle = document.getElementById('circle');
        const countEl = document.getElementById('count');
        const instructionEl = document.getElementById('instruction');
        const cycleCountEl = document.getElementById('cycleCount');
        const doneBtn = document.getElementById('doneBtn');

        function updateCircle() {
            const phase = phases[currentPhase];
            const transitionTime = currentCount === phase.duration ? phase.duration : 1;
            circle.style.transition = `transform ${transitionTime}s ease-in-out`;
            circle.style.transform = `scale(${phase.scale})`;
        }

        function tick() {
            const phase = phases[currentPhase];
            countEl.textContent = currentCount;
            instructionEl.textContent = phase.name;
            cycleCountEl.textContent = `Cycle ${currentCycle} of ${totalCycles}`;

            updateCircle();

            currentCount--;

            if (currentCount < 1) {
                currentPhase++;
                if (currentPhase >= phases.length) {
                    currentPhase = 0;
                    currentCycle++;
                    if (currentCycle > totalCycles) {
                        finish();
                        return;
                    }
                }
                currentCount = phases[currentPhase].duration;
            }
        }

        function finish() {
            instructionEl.textContent = "Well done";
            countEl.textContent = "✓";
            cycleCountEl.textContent = "Exercise complete";
            circle.style.transform = "scale(1)";
            document.getElementById('btnContainer').style.display = "flex";
            clearInterval(timer);
        }

        function restart() {
            currentPhase = 0;
            currentCount = phases[0].duration;
            currentCycle = 1;
            document.getElementById('btnContainer').style.display = "none";
            tick();
            timer = setInterval(tick, 1000);
        }

        function done() {
            window.AppInventor.setWebViewString('navigate:chat');
        }

        function confirmExit() {
            const confirmed = confirm("Are you sure you want to exit the breathing exercise?");
            if (confirmed) {
            window.AppInventor.setWebViewString('navigate:chat');
            }
        }


        /* function done() {
             window.location.href = "https://done.exit";
         }*/

       /* function confirmExit() {
            const confirmed = confirm("Are you sure you want to exit the breathing exercise?");
            if (confirmed) {
                window.location.href = "https://done.exit";
            }
        } */
        tick();
        let timer = setInterval(tick, 1000);
    </script>
</body>

</html>

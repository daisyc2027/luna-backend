<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kira — Reflect</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --rose: #e8a5b0;
      --blush: #f2c4ce;
      --lavender: #c9b8e8;
      --deep: #2d1f35;
      --card: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.14);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--deep);
      font-family: 'DM Sans', sans-serif;
      color: white;
      touch-action: none;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(201, 184, 232, 0.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(232, 165, 176, 0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Loading Screen ── */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-symbol {
      font-size: 36px;
      color: var(--lavender);
      animation: pulse-glow 1.6s ease-in-out infinite;
    }

    .loading-text {
      margin-top: 16px;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    /* ── Page Wrapper ── */
    .page-wrapper {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      position: relative;
      z-index: 1;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .page-wrapper.visible {
      opacity: 1;
    }

    /* ── Header ── */
    .header {
      padding: 52px 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
      flex-shrink: 0;
      touch-action: none;
    }

    .exit-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: var(--card);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.6);
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      border: 1px solid var(--border);
    }

    .exit-btn:active {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 28px;
      color: white;
    }

    .timer-toggle {
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      letter-spacing: 0.5px;
    }

    .timer-toggle.active {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--lavender);
    }

    .timer-display {
      position: fixed;
      top: 56px;
      right: 20px;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.35);
      font-family: 'DM Sans', sans-serif;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .timer-display.visible {
      opacity: 1;
    }

    /* ── Container ── */
    .container {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 20px 20px;
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
      touch-action: pan-y;
      overscroll-behavior: contain;
    }

    /* ── Phase Badge ── */
    .phase-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 1px;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(8px);
      animation: fade-up 0.5s ease forwards;
      animation-delay: 0.1s;
    }

    /* ── Prompt Area ── */
    .prompt-section {
      min-height: 100px;
      margin-bottom: 20px;
      position: relative;
    }

    .prompt-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 26px;
      line-height: 1.35;
      color: white;
      opacity: 0;
      transform: translateY(10px);
      animation: fade-up 0.5s ease forwards;
      animation-delay: 0.2s;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .prompt-text.switching {
      opacity: 0;
      transform: translateY(-8px);
    }

    /* ── Text Area ── */
    .journal-textarea {
      width: 100%;
      min-height: 140px;
      max-height: 280px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.6;
      color: white;
      resize: none;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      opacity: 0;
      animation: fade-up 0.5s ease forwards;
      animation-delay: 0.3s;
      overflow-y: auto;
    }

    .journal-textarea::placeholder {
      color: rgba(255, 255, 255, 0.3);
      font-style: italic;
    }

    .journal-textarea:focus {
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 20px rgba(201, 184, 232, 0.08);
    }

    /* ── Navigation ── */
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      opacity: 0;
      animation: fade-up 0.5s ease forwards;
      animation-delay: 0.4s;
    }

    .nav-arrow {
      width: 48px;
      height: 48px;
      border: none;
      background: var(--card);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
      border: 1px solid var(--border);
    }

    .nav-arrow:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.15);
    }

    .nav-arrow:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .nav-arrow:disabled:active {
      transform: none;
      background: var(--card);
    }

    .dot-indicators {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .dot.active {
      background: var(--lavender);
      transform: scale(1.25);
    }

    /* ── Bottom Actions ── */
    .bottom-actions {
      padding: 16px 20px 32px;
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
      touch-action: none;
    }

    .btn-save {
      flex: 1;
      height: 50px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 14px;
      color: rgba(255, 255, 255, 0.8);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .btn-save:active {
      transform: scale(0.97);
      background: rgba(255, 255, 255, 0.14);
    }

    .btn-finish {
      flex: 1;
      height: 50px;
      border: none;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease, opacity 0.3s ease;
    }

    .btn-finish:active {
      transform: scale(0.97);
    }

    .btn-finish:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .btn-finish:disabled:active {
      transform: none;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 50;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Completion Screen ── */
    .completion-screen {
      position: fixed;
      inset: 0;
      background: var(--deep);
      z-index: 80;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .completion-screen.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .completion-screen::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(201, 184, 232, 0.22) 0%, transparent 70%);
      pointer-events: none;
    }

    .completion-screen::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(232, 165, 176, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .completion-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 320px;
    }

    .completion-icon {
      font-size: 40px;
      margin-bottom: 24px;
      opacity: 0;
      transform: scale(0.8);
      animation: scale-in 0.6s ease forwards;
      animation-delay: 0.2s;
    }

    .completion-message {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 24px;
      line-height: 1.4;
      color: white;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(12px);
      animation: fade-up 0.6s ease forwards;
      animation-delay: 0.4s;
    }

    /* ── Rating Overlay ── */
    .rating-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .rating-overlay.visible { opacity: 1; pointer-events: auto; }
    .rating-sheet {
      background: #3a2a45;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 36px;
      width: 100%;
      max-width: 420px;
      transform: translateY(100%);
      transition: transform 0.35s ease;
      text-align: center;
    }
    .rating-overlay.visible .rating-sheet { transform: translateY(0); }
    .rating-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      font-style: italic;
      color: white;
      margin-bottom: 6px;
    }
    .rating-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 20px;
    }
    .rating-stars {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .rating-star {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.3);
    }
    .rating-star.lit {
      background: rgba(232,165,176,0.2);
      border-color: rgba(232,165,176,0.4);
      color: #e8a5b0;
    }
    .rating-star:active { transform: scale(0.9); }
    .rating-submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #c9b8e8, #e8a5b0);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: white;
      cursor: pointer;
      min-height: 50px;
      transition: transform 0.15s, opacity 0.3s;
      opacity: 0.35;
    }
    .rating-submit-btn.enabled { opacity: 1; }
    .rating-submit-btn:active { transform: scale(0.97); }
    .rating-skip {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      padding: 8px;
    }

    /* ── Error Message ── */
    .error-screen {
      position: fixed;
      inset: 0;
      background: var(--deep);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .error-screen.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .error-icon {
      font-size: 36px;
      margin-bottom: 16px;
      color: var(--rose);
    }

    .error-text {
      font-size: 15px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .error-retry {
      padding: 12px 28px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 12px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .error-retry:active {
      background: rgba(255, 255, 255, 0.15);
    }

    /* ── Confirm Dialog ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 30px;
    }

    .confirm-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .confirm-dialog {
      background: #3a2a45;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 24px 20px;
      max-width: 300px;
      width: 100%;
      text-align: center;
    }

    .confirm-dialog h3 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .confirm-dialog p {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .confirm-buttons {
      display: flex;
      gap: 10px;
    }

    .confirm-buttons button {
      flex: 1;
      height: 44px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .confirm-buttons button:active {
      transform: scale(0.96);
    }

    .btn-stay {
      background: var(--card);
      border: 1px solid var(--border);
      color: white;
    }

    .btn-leave {
      background: rgba(232, 165, 176, 0.2);
      border: 1px solid rgba(232, 165, 176, 0.3);
      color: var(--rose);
    }

    /* ── Keyframes ── */
    @keyframes fade-up {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scale-in {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-symbol">&#10022;</div>
    <div class="loading-text">Preparing your space</div>
  </div>

  <!-- Error Screen -->
  <div class="error-screen" id="errorScreen">
    <div class="error-icon">&#10022;</div>
    <div class="error-text">Something went wrong while setting up your journal. Please try again.</div>
    <button class="error-retry" onclick="initJournal()">Try again</button>
  </div>

  <!-- Confirm Exit Dialog -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-dialog">
      <h3>Leave journaling?</h3>
      <p>Your unsaved writing will be lost.</p>
      <div class="confirm-buttons">
        <button class="btn-stay" onclick="closeConfirm()">Stay</button>
        <button class="btn-leave" onclick="exitPage()">Leave</button>
      </div>
    </div>
  </div>

  <!-- Timer Display -->
  <div class="timer-display" id="timerDisplay">5:00</div>

  <!-- Main Page -->
  <div class="page-wrapper" id="pageWrapper">
    <div class="header">
      <button class="exit-btn" onclick="handleExit()" aria-label="Exit">&#10005;</button>
      <div class="header-title">Reflect</div>
      <button class="timer-toggle" id="timerToggle" onclick="toggleTimer()" aria-label="Toggle timer">5m</button>
    </div>

    <div class="container" id="mainContainer">
      <div class="phase-badge" id="phaseBadge"></div>
      <div class="prompt-section">
        <div class="prompt-text" id="promptText"></div>
      </div>
      <textarea class="journal-textarea" id="journalTextarea" placeholder="Write freely here..."
        oninput="onTextareaInput()"></textarea>
      <div class="nav-row">
        <button class="nav-arrow" id="prevBtn" onclick="goPrompt(-1)" aria-label="Previous prompt">&#8592;</button>
        <div class="dot-indicators" id="dotIndicators"></div>
        <button class="nav-arrow" id="nextBtn" onclick="goPrompt(1)" aria-label="Next prompt">&#8594;</button>
      </div>
    </div>

    <div class="bottom-actions">
      <button class="btn-save" onclick="saveEntry()">Save</button>
      <button class="btn-finish" id="finishBtn" onclick="finishJournal()" disabled>Finish</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Completion Screen -->
  <div class="completion-screen" id="completionScreen">
    <div class="completion-content">
      <div class="completion-icon">&#10022;</div>
      <div class="completion-message" id="completionMessage"></div>
    </div>
  </div>

  <!-- Rating Overlay -->
  <div class="rating-overlay" id="ratingOverlay">
    <div class="rating-sheet">
      <div class="rating-title">Did this help?</div>
      <div class="rating-sub">Your feedback helps Kira learn what works for you</div>
      <div class="rating-stars" id="ratingStars"></div>
      <button class="rating-submit-btn" id="ratingSubmitBtn" onclick="submitRating()">Submit</button>
      <div class="rating-skip" onclick="skipRating()">Skip</div>
    </div>
  </div>

  <script>
    (function(){var t=localStorage.getItem('kira_theme'),c={'default':'#2d1f35','midnight':'#1a1a2e','warm':'#2d2025'};if(t&&c[t])document.documentElement.style.setProperty('--deep',c[t]);})();
    const API = 'https://kira-backend-lcwr.onrender.com';
    const USER_ID = (function() {
      try { var ws = window.AppInventor.getWebViewString(); if (ws && ws.indexOf('user:') === 0) return ws.split(':')[1]; } catch(e) {}
      return localStorage.getItem('kira_user') || 'user_1';
    })();

    const PHASE_PROMPTS = {
      menstrual: [
        "What do I need to let go of?",
        "How can I be gentler with myself today?",
        "What does rest look like for me right now?"
      ],
      follicular: [
        "What am I excited to create or start?",
        "Who do I want to connect with and why?",
        "What would I do if I knew I couldn't fail?"
      ],
      ovulatory: [
        "What do I want to communicate that I've been holding back?",
        "What am I most confident about right now?",
        "How can I use my energy to help others today?"
      ],
      luteal: [
        "What emotions am I carrying that haven't been acknowledged?",
        "What boundaries do I need to set?",
        "What is my inner critic saying — and what would a kind friend say instead?"
      ]
    };

    const PHASE_COLORS = {
      menstrual: { bg: 'rgba(232,165,176,0.15)', border: 'rgba(232,165,176,0.3)', text: '#e8a5b0' },
      follicular: { bg: 'rgba(201,184,232,0.15)', border: 'rgba(201,184,232,0.3)', text: '#c9b8e8' },
      ovulatory: { bg: 'rgba(242,196,206,0.15)', border: 'rgba(242,196,206,0.3)', text: '#f2c4ce' },
      luteal: { bg: 'rgba(201,184,232,0.15)', border: 'rgba(201,184,232,0.3)', text: '#c9b8e8' }
    };

    const PHASE_FINISH_BTN = {
      menstrual: { bg: 'linear-gradient(135deg, #e8a5b0, #d4909c)', color: '#2d1f35' },
      follicular: { bg: 'linear-gradient(135deg, #c9b8e8, #b0a0d4)', color: '#2d1f35' },
      ovulatory: { bg: 'linear-gradient(135deg, #f2c4ce, #e8a5b0)', color: '#2d1f35' },
      luteal: { bg: 'linear-gradient(135deg, #c9b8e8, #a898d0)', color: '#2d1f35' }
    };

    const COMPLETION_MESSAGES = {
      menstrual: "Rest is productive. You've honoured your feelings today.",
      follicular: "Your ideas are seeds. You've planted something today.",
      ovulatory: "Your voice matters. You've spoken your truth.",
      luteal: "You're allowed to feel it all. You've given yourself space."
    };

    let currentPhase = '';
    let cycleDay = 1;
    let prompts = [];
    let currentIndex = 0;
    let entries = ['', '', ''];
    let hasWritten = [false, false, false];
    let sessionStart = Date.now();
    let selectedRating = 0;

    // Timer state
    let timerEnabled = false;
    let timerRunning = false;
    let timerSeconds = 300;
    let timerInterval = null;
    let typingStarted = false;

    // ── Init ──
    async function initJournal() {
      document.getElementById('errorScreen').classList.remove('visible');
      document.getElementById('loadingScreen').classList.remove('hidden');
      document.getElementById('pageWrapper').classList.remove('visible');

      try {
        const res = await fetch(API + '/cycle_status?user_id=' + USER_ID);
        if (!res.ok) throw new Error('Failed to fetch cycle status');
        const data = await res.json();

        currentPhase = (data.phase || 'follicular').toLowerCase();
        cycleDay = data.cycle_day || 1;

        if (!PHASE_PROMPTS[currentPhase]) currentPhase = 'follicular';
        prompts = PHASE_PROMPTS[currentPhase];

        setupUI();
        setTimeout(() => {
          document.getElementById('loadingScreen').classList.add('hidden');
          document.getElementById('pageWrapper').classList.add('visible');
        }, 600);
      } catch (e) {
        console.error(e);
        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('errorScreen').classList.add('visible');
      }
    }

    function setupUI() {
      const colors = PHASE_COLORS[currentPhase];
      const badge = document.getElementById('phaseBadge');
      badge.textContent = 'Prompts for your ' + currentPhase + ' phase';
      badge.style.background = colors.bg;
      badge.style.border = '1px solid ' + colors.border;
      badge.style.color = colors.text;

      const finishBtn = document.getElementById('finishBtn');
      const btnStyle = PHASE_FINISH_BTN[currentPhase];
      finishBtn.style.background = btnStyle.bg;
      finishBtn.style.color = btnStyle.color;

      // Build dots
      const dotsContainer = document.getElementById('dotIndicators');
      dotsContainer.innerHTML = '';
      for (let i = 0; i < prompts.length; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.style.cursor = 'pointer';
        dot.addEventListener('click', function () { goToPrompt(i); });
        dotsContainer.appendChild(dot);
      }

      showPrompt(0, false);
      updateNav();
    }

    // ── Prompt Navigation ──
    function showPrompt(index, animate) {
      const el = document.getElementById('promptText');
      const textarea = document.getElementById('journalTextarea');

      if (animate) {
        el.classList.add('switching');
        setTimeout(() => {
          el.textContent = prompts[index];
          textarea.value = entries[index];
          autoResize(textarea);
          el.classList.remove('switching');
        }, 200);
      } else {
        el.textContent = prompts[index];
        textarea.value = entries[index];
        autoResize(textarea);
      }

      // Update dots
      var dots = document.querySelectorAll('.dot');
      dots.forEach(function (d, i) {
        d.classList.toggle('active', i === index);
      });
    }

    function goPrompt(dir) {
      entries[currentIndex] = document.getElementById('journalTextarea').value;
      var newIndex = currentIndex + dir;
      if (newIndex < 0 || newIndex >= prompts.length) return;
      currentIndex = newIndex;
      showPrompt(currentIndex, true);
      updateNav();
    }

    function goToPrompt(index) {
      if (index === currentIndex) return;
      entries[currentIndex] = document.getElementById('journalTextarea').value;
      currentIndex = index;
      showPrompt(currentIndex, true);
      updateNav();
    }

    function updateNav() {
      document.getElementById('prevBtn').disabled = currentIndex === 0;
      document.getElementById('nextBtn').disabled = currentIndex === prompts.length - 1;
    }

    // ── Textarea ──
    function onTextareaInput() {
      var textarea = document.getElementById('journalTextarea');
      entries[currentIndex] = textarea.value;
      autoResize(textarea);

      if (textarea.value.trim().length > 0) {
        hasWritten[currentIndex] = true;
        document.getElementById('finishBtn').disabled = false;
      }

      // Start timer on first typing if enabled
      if (timerEnabled && !typingStarted && textarea.value.length > 0) {
        typingStarted = true;
        startTimer();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      var newHeight = Math.min(el.scrollHeight, 280);
      el.style.height = newHeight + 'px';
    }

    // ── Timer ──
    function toggleTimer() {
      timerEnabled = !timerEnabled;
      var btn = document.getElementById('timerToggle');
      var display = document.getElementById('timerDisplay');

      btn.classList.toggle('active', timerEnabled);

      if (timerEnabled) {
        display.classList.add('visible');
        display.textContent = '5:00';
        timerSeconds = 300;
        if (typingStarted) startTimer();
      } else {
        display.classList.remove('visible');
        stopTimer();
      }
    }

    function startTimer() {
      if (timerRunning) return;
      timerRunning = true;
      timerInterval = setInterval(function () {
        timerSeconds--;
        if (timerSeconds <= 0) {
          timerSeconds = 0;
          stopTimer();
          showToast("Time's up — take a breath");
        }
        updateTimerDisplay();
      }, 1000);
    }

    function stopTimer() {
      timerRunning = false;
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function updateTimerDisplay() {
      var m = Math.floor(timerSeconds / 60);
      var s = timerSeconds % 60;
      document.getElementById('timerDisplay').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    }

    // ── Save ──
    async function saveEntry() {
      var textarea = document.getElementById('journalTextarea');
      entries[currentIndex] = textarea.value;

      if (!entries[currentIndex].trim()) {
        showToast('Write something first');
        return;
      }

      try {
        var res = await fetch(API + '/save_journal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: prompts[currentIndex],
            entry: entries[currentIndex],
            phase: currentPhase,
            cycle_day: cycleDay,
            user_id: USER_ID
          })
        });

        if (!res.ok) throw new Error('Save failed');
        hasWritten[currentIndex] = true;
        document.getElementById('finishBtn').disabled = false;
        showToast('Saved \u2713');
      } catch (e) {
        console.error(e);
        showToast('Could not save — please try again');
      }
    }

    // ── Toast ──
    function showToast(msg) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, 2200);
    }

    // ── Finish ──
    function finishJournal() {
      if (!hasWritten.some(function (w) { return w; })) return;

      // Save current entry in memory
      entries[currentIndex] = document.getElementById('journalTextarea').value;

      var screen = document.getElementById('completionScreen');
      document.getElementById('completionMessage').textContent = COMPLETION_MESSAGES[currentPhase];
      screen.classList.add('visible');
      setTimeout(function() { showRatingPopup(); }, 1500);
    }

    // ── Rating Popup ──
    function showRatingPopup() {
      var starsEl = document.getElementById('ratingStars');
      starsEl.innerHTML = '';
      for (var i = 1; i <= 5; i++) {
        var star = document.createElement('div');
        star.className = 'rating-star';
        star.textContent = '\u2605';
        star.dataset.value = i;
        star.onclick = (function(val) {
          return function() { selectStar(val); };
        })(i);
        starsEl.appendChild(star);
      }
      selectedRating = 0;
      document.getElementById('ratingSubmitBtn').classList.remove('enabled');
      document.getElementById('ratingOverlay').classList.add('visible');
    }

    function selectStar(val) {
      selectedRating = val;
      var stars = document.querySelectorAll('.rating-star');
      stars.forEach(function(s, idx) {
        s.classList.toggle('lit', idx < val);
      });
      document.getElementById('ratingSubmitBtn').classList.add('enabled');
    }

    function getRatingPayload() {
      var elapsed = Math.round((Date.now() - sessionStart) / 1000);
      return {
        intervention_id: 'phase_reflect',
        intervention_name: 'Phase Reflection',
        intervention_type: 'journaling',
        rating: selectedRating,
        phase: currentPhase,
        cycle_day: cycleDay,
        duration_seconds: elapsed,
        user_id: USER_ID
      };
    }

    function submitRating() {
      if (!selectedRating) return;
      fetch(API + '/rate_intervention', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(getRatingPayload())
      }).catch(function() {});
      document.getElementById('ratingOverlay').classList.remove('visible');
      setTimeout(function() {
        window.AppInventor.setWebViewString('navigate:interventions');
      }, 400);
    }

    function skipRating() {
      document.getElementById('ratingOverlay').classList.remove('visible');
      setTimeout(function() {
        window.AppInventor.setWebViewString('navigate:interventions');
      }, 400);
    }

    // ── Exit Handling ──
    function handleExit() {
      var anyContent = entries.some(function (e) { return e.trim().length > 0; });
      if (anyContent) {
        document.getElementById('confirmOverlay').classList.add('visible');
      } else {
        exitPage();
      }
    }

    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.remove('visible');
    }

    function exitPage() {
      window.AppInventor.setWebViewString('navigate:interventions');
    }

    // ── Prevent body scroll ──
    var journalContainer = document.getElementById('mainContainer');
    document.addEventListener('touchmove', function(e) {
      var target = e.target;
      while (target && target !== document.body && target !== document.documentElement) {
        if (target === journalContainer) return;
        target = target.parentNode;
      }
      e.preventDefault();
    }, { passive: false });

    // ── Keyboard handling ──
    var textarea = document.getElementById('journalTextarea');
    var journalWrapper = document.querySelector('.page-wrapper');
    var lastJournalVH = window.innerHeight;

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', function () {
        var newH = window.visualViewport.height;
        journalWrapper.style.height = newH + 'px';
        window.scrollTo(0, 0);
        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;
        if (newH < lastJournalVH && document.activeElement === textarea) {
          textarea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        lastJournalVH = newH;
      });
      window.visualViewport.addEventListener('scroll', function () {
        window.scrollTo(0, 0);
      });
    }

    textarea.addEventListener('focus', function () {
      setTimeout(function () {
        window.scrollTo(0, 0);
        textarea.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 300);
    });

    textarea.addEventListener('blur', function () {
      setTimeout(function () {
        window.scrollTo(0, 0);
        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;
      }, 100);
    });

    // ── Start ──
    initJournal();
  </script>

</body>

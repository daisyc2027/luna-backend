<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kira — Breathe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose: #e8a5b0;
      --blush: #f2c4ce;
      --lavender: #c9b8e8;
      --deep: #2d1f35;
      --card: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.14);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--deep);
      font-family: 'DM Sans', sans-serif;
      color: white;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30%; left: -20%;
      width: 70%; height: 70%;
      background: radial-gradient(circle, rgba(201,184,232,0.22) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%; right: -20%;
      width: 60%; height: 60%;
      background: radial-gradient(circle, rgba(232,165,176,0.18) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 52px 20px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 24px;
      font-weight: 300;
      color: var(--blush);
      letter-spacing: 1px;
    }

    .exit-btn {
      position: absolute;
      right: 20px;
      top: 52px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      cursor: pointer;
    }

    .exit-btn:active {
      background: rgba(255,255,255,0.15);
    }

    /* ── Breathing circle ── */
    .circle-container {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ripple {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(201,184,232,0.12);
      animation: ripple 4s ease-out infinite;
    }

    .ripple:nth-child(2) { animation-delay: 1s; }
    .ripple:nth-child(3) { animation-delay: 2s; }

    @keyframes ripple {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    .main-circle {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--lavender), var(--rose));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 50px rgba(201,184,232,0.35);
      transition: transform 0s;
      z-index: 1;
      will-change: transform;
    }

    .count-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 300;
      color: white;
    }

    /* ── Instruction ── */
    .instruction-text {
      margin-top: 40px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      font-weight: 300;
      color: var(--blush);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .cycle-count {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px;
    }

    /* ── Buttons ── */
    .btn-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 40px;
    }

    .again-btn {
      padding: 14px 40px;
      min-height: 48px;
      background: rgba(201,184,232,0.18);
      border: 1px solid rgba(201,184,232,0.3);
      border-radius: 28px;
      color: var(--lavender);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .again-btn:active { transform: scale(0.96); }

    .done-btn {
      padding: 14px 40px;
      min-height: 48px;
      background: linear-gradient(135deg, var(--lavender), var(--rose));
      border: none;
      border-radius: 28px;
      color: var(--deep);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(201,184,232,0.3);
      transition: transform 0.15s;
    }

    .done-btn:active { transform: scale(0.96); }

    /* ── Exit Confirm Dialog ── */
    .dialog-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .dialog-overlay.visible { opacity: 1; pointer-events: auto; }
    .dialog-box {
      background: #3a2a45;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 20px;
      max-width: 280px;
      width: 90%;
      text-align: center;
    }
    .dialog-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 20px;
      color: var(--blush);
      margin-bottom: 8px;
    }
    .dialog-msg {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .dialog-actions { display: flex; gap: 10px; }
    .dialog-btn {
      flex: 1;
      padding: 12px 0;
      min-height: 44px;
      border-radius: 14px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .dialog-btn:active { transform: scale(0.96); }
    .dialog-btn.cancel {
      background: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.14);
    }
    .dialog-btn.confirm-leave {
      background: var(--rose);
      color: var(--deep);
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <!-- Header -->
    <div class="header">
      <span class="header-title">Breathe</span>
      <div class="exit-btn" onclick="showExitDialog()">&#10005;</div>
    </div>

    <div class="circle-container">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="main-circle" id="circle">
        <span class="count-text" id="count">4</span>
      </div>
    </div>

    <div class="instruction-text" id="instruction">Inhale</div>
    <div class="cycle-count" id="cycleCount">Cycle 1 of 4</div>

    <div class="btn-container" id="btnContainer">
      <button class="again-btn" onclick="restart()">Do it again</button>
      <button class="done-btn" onclick="done()">Done</button>
    </div>
  </div>

  <!-- Exit Confirm Dialog -->
  <div class="dialog-overlay" id="exitDialog">
    <div class="dialog-box">
      <div class="dialog-title">Leave exercise?</div>
      <div class="dialog-msg">Your progress won't be saved.</div>
      <div class="dialog-actions">
        <button class="dialog-btn cancel" onclick="hideExitDialog()">Stay</button>
        <button class="dialog-btn confirm-leave" onclick="doExit()">Leave</button>
      </div>
    </div>
  </div>

  <script>
    var phases = [
      { name: "Inhale", duration: 4, scale: 1.3 },
      { name: "Hold", duration: 4, scale: 1.3 },
      { name: "Exhale", duration: 6, scale: 0.85 },
      { name: "Rest", duration: 2, scale: 0.85 }
    ];

    var currentPhase = 0;
    var currentCount = phases[0].duration;
    var currentCycle = 1;
    var totalCycles = 4;

    var circle = document.getElementById('circle');
    var countEl = document.getElementById('count');
    var instructionEl = document.getElementById('instruction');
    var cycleCountEl = document.getElementById('cycleCount');

    function updateCircle() {
      var phase = phases[currentPhase];
      var transitionTime = currentCount === phase.duration ? phase.duration : 1;
      circle.style.transition = 'transform ' + transitionTime + 's ease-in-out';
      circle.style.transform = 'scale(' + phase.scale + ')';
    }

    function tick() {
      var phase = phases[currentPhase];
      countEl.textContent = currentCount;
      instructionEl.textContent = phase.name;
      cycleCountEl.textContent = 'Cycle ' + currentCycle + ' of ' + totalCycles;

      updateCircle();
      currentCount--;

      if (currentCount < 1) {
        currentPhase++;
        if (currentPhase >= phases.length) {
          currentPhase = 0;
          currentCycle++;
          if (currentCycle > totalCycles) {
            finish();
            return;
          }
        }
        currentCount = phases[currentPhase].duration;
      }
    }

    function finish() {
      instructionEl.textContent = "Well done";
      countEl.textContent = "✦";
      cycleCountEl.textContent = "Exercise complete";
      circle.style.transform = "scale(1)";
      document.getElementById('btnContainer').style.display = "flex";
      clearInterval(timer);
    }

    function restart() {
      currentPhase = 0;
      currentCount = phases[0].duration;
      currentCycle = 1;
      document.getElementById('btnContainer').style.display = "none";
      tick();
      timer = setInterval(tick, 1000);
    }

    function done() {
      window.AppInventor.setWebViewString('navigate:back');
    }

    // Exit dialog
    function showExitDialog() {
      document.getElementById('exitDialog').classList.add('visible');
    }

    function hideExitDialog() {
      document.getElementById('exitDialog').classList.remove('visible');
    }

    function doExit() {
      clearInterval(timer);
      window.AppInventor.setWebViewString('navigate:back');
    }

    tick();
    var timer = setInterval(tick, 1000);
  </script>
</body>

</html>
